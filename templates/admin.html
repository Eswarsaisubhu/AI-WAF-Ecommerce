{% extends "base.html" %}

{% block content %}

<section style="padding:40px; text-align:center;">

<h1 style="
    font-size:32px;
    margin-bottom:20px;
    color:#00ffcc;
    letter-spacing:1px;
">
Admin User Management Panel
</h1>

<table style="
    margin: auto;
    width:85%;
    border-collapse: collapse;
    background: #1e1e1e;
    color: white;
    border-radius:10px;
    overflow:hidden;
    box-shadow: 0 0 20px rgba(0,255,200,0.2);
">

<tr style="background:#00ffcc; color:black;">
<th style="padding:12px;">ID</th>
<th>Username</th>
<th>Email</th>
<th>Role</th>
<th>Actions</th>
</tr>

{% for user in users %}
<tr style="border-bottom:1px solid #333;">
<td style="padding:10px;">{{loop.index}}</td>
<td>{{user[1]}}</td>
<td>{{user[2]}}</td>
<td>{{user[3]}}</td>

<td>
    <a href="/make_admin/{{user[0]}}">
        <button style="
            background:#28a745;
            color:white;
            border:none;
            padding:6px 12px;
            margin:2px;
            border-radius:5px;
            cursor:pointer;
        ">
        Make Admin
        </button>
    </a>

    <a href="/delete_user/{{user[0]}}">
        <button style="
            background:#dc3545;
            color:white;
            border:none;
            padding:6px 12px;
            margin:2px;
            border-radius:5px;
            cursor:pointer;
        ">
        Delete
        </button>
    </a>
</td>

</tr>
{% endfor %}

</table>

</section>

{% endblock %}
